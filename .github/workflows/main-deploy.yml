name: Deploy Laravel via SFTP

on:
  push:
    branches:
      - main # Script berjalan saat ada push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Mengambil Kode dari GitHub
        uses: actions/checkout@v3

      - name: 🐘 Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath

      - name: 📦 Install Dependensi PHP (Composer)
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 🛠️ Build Aset Frontend (Vite/Tailwind)
        run: |
          npm ci
          npm run build

      - name: 🧹 Bersihkan File Tidak Perlu (Mempercepat Upload)
        run: rm -rf node_modules

      - name: 🚀 Upload File ke ZenHosta via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './'
          remote_path: '/home/sistemja/sistemja-cms/'
          sftpArgs: '-o ConnectTimeout=15'
