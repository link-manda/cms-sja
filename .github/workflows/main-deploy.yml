name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main # Script berjalan setiap kali ada push ke branch main

jobs:
  web-deploy:
    name: 🎉 Deploy via SSH (Encrypted Key)
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, curl, dom, fileinfo, zip, gd

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm ci
        npm run build

    - name: 🗜️ Compress files
      run: |
        tar -czf /tmp/deploy.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='.env.example' \
          --exclude='tests' \
          --exclude='_cms-sja-excluded' \
          --exclude='docs' \
          --exclude='phpunit.xml' \
          --exclude='README.md' \
          --exclude='CLAUDE.md' \
          --exclude='storage/logs/*' \
          --exclude='storage/framework/cache/*' \
          --exclude='storage/framework/sessions/*' \
          --exclude='storage/framework/views/*' \
          --exclude='bootstrap/cache/*' \
          . || true

    - name: 🚀 Upload to Server via SCP
      env:
        SSHPASS: ${{ secrets.SSH_PASSWORD }}
      run: |
        sshpass -e scp -o StrictHostKeyChecking=no /tmp/deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/sistemja/

    - name: 💥 Extract and Deploy via SSH
      env:
        SSHPASS: ${{ secrets.SSH_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /home/sistemja/
          mkdir -p cms-core
          tar -xzf deploy.tar.gz -C cms-core/
          rm deploy.tar.gz
          cd cms-core
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
          php artisan storage:link 2>/dev/null || true
          echo "Deploy selesai!"
        EOF
