name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy via rsync
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: 📦 Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🟢 Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-npm-

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm install
        npm run build

    - name: 🔧 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -t rsa,ecdsa,ed25519 -H ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null || true

    # Step 1: Deploy Laravel core ke /core-cms/ (exclude public, storage, tests)
    - name: 📂 Deploy Laravel Core ke /core-cms/
      run: |
        rsync -avz --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          --exclude='.git*' \
          --exclude='node_modules/' \
          --exclude='public/' \
          --exclude='tests/' \
          --exclude='storage/' \
          --exclude='.env' \
          --exclude='.env.example' \
          --exclude='phpunit.xml' \
          --exclude='.editorconfig' \
          --exclude='.github/' \
          ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/sistemja/core-cms/

    # Step 2: Deploy isi public/ ke /public_html/
    - name: 📂 Deploy Public Assets ke /public_html/
      run: |
        rsync -avz --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          --exclude='.git*' \
          --exclude='.env' \
          ./public/ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/sistemja/public_html/
