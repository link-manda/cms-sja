name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy via SFTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm install
        npm run build

    # Step 1: Deploy Laravel core ke /core-cms/
    - name: 📂 Deploy Laravel Core ke /core-cms/
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        local_path: '.'
        remote_path: '/home/sistemja/core-cms'
        sftpArgs: '-o StrictHostKeyChecking=no'
        delete_remote_files: false

    # Step 2: Deploy isi public/ ke /public_html/
    - name: 📂 Deploy Public Assets ke /public_html/
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        local_path: './public'
        remote_path: '/home/sistemja/public_html'
        sftpArgs: '-o StrictHostKeyChecking=no'
        delete_remote_files: false
