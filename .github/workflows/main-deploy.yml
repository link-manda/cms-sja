name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy via SSH
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: 📦 Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🟢 Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: ${{ runner.os }}-npm-

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm install
        npm run build

    - name: 🔧 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -t rsa,ecdsa,ed25519 -H ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null || true

    # Step 1: Archive core files (exclude public, storage, tests, etc)
    - name: 📦 Archive Laravel Core
      run: |
        tar czf /tmp/core.tar.gz \
          --exclude='./.git*' \
          --exclude='./node_modules' \
          --exclude='./public' \
          --exclude='./tests' \
          --exclude='./storage' \
          --exclude='./.env' \
          --exclude='./.env.example' \
          --exclude='./phpunit.xml' \
          --exclude='./.editorconfig' \
          --exclude='./.github' \
          .

    # Step 2: Generate custom index.php for production and archive public files
    - name: 📦 Generate Production index.php and Archive Public Assets
      run: |
        cat > public/index.php << 'PHP'
        <?php

        use Illuminate\Foundation\Application;
        use Illuminate\Http\Request;

        define('LARAVEL_START', microtime(true));

        // Determine if the application is in maintenance mode...
        if (file_exists($maintenance = __DIR__.'/../core-cms/storage/framework/maintenance.php')) {
            require $maintenance;
        }

        // Register the Composer autoloader...
        require __DIR__.'/../core-cms/vendor/autoload.php';

        // Bootstrap Laravel and handle the request...
        /** @var Application $app */
        $app = require_once __DIR__.'/../core-cms/bootstrap/app.php';

        $app->handleRequest(Request::capture());
        PHP
        tar czf /tmp/public.tar.gz -C public .

    # Step 3: Upload + extract in one SSH connection
    - name: 📤 Upload and Deploy
      run: |
        SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o ConnectTimeout=60"

        # Upload both archives
        scp $SSH_OPTS /tmp/core.tar.gz /tmp/public.tar.gz \
          ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/tmp/

        # Extract in single SSH connection
        ssh $SSH_OPTS ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} bash << 'REMOTE'
        set -e

        # Deploy core-cms (preserve .env and storage/)
        cd /home/sistemja/core-cms
        find . -maxdepth 1 -not -name '.' -not -name 'storage' -not -name '.env' -exec rm -rf {} +
        tar xzf /tmp/core.tar.gz
        rm -f /tmp/core.tar.gz

        # CRITICAL: Remove storage .htaccess (blocks symlink access to images)
        if [ -f /home/sistemja/core-cms/storage/.htaccess ]; then
            echo "Removing blocking .htaccess from storage directory..."
            chmod 644 /home/sistemja/core-cms/storage/.htaccess 2>/dev/null || true
            rm -vf /home/sistemja/core-cms/storage/.htaccess
        fi

        # Verify storage is accessible
        echo "Checking storage directory structure:"
        ls -la /home/sistemja/core-cms/storage/.htaccess 2>&1 || echo "✓ .htaccess removed"
        echo "Storage projects directory:"
        ls /home/sistemja/core-cms/storage/app/public/projects/ | head -3 || echo "No projects found"

        # Deploy public_html
        cd /home/sistemja/public_html
        rm -rf *
        tar xzf /tmp/public.tar.gz
        rm -f /tmp/public.tar.gz

        # Create symlink: core-cms/public/build -> public_html/build
        mkdir -p /home/sistemja/core-cms/public
        ln -sfn /home/sistemja/public_html/build /home/sistemja/core-cms/public/build

        # Deploy storage files (copy instead of symlink to avoid LiteSpeed symlink 403)
        rm -rf /home/sistemja/public_html/storage
        cp -r /home/sistemja/core-cms/storage/app/public /home/sistemja/public_html/storage

        # ===== SECURITY: Block web access to sensitive directories =====

        # Block ALL web access to core-cms directory (except storage/app/public for symlinked images)
        cat > /home/sistemja/core-cms/.htaccess << 'HTEOF'
        <IfModule mod_rewrite.c>
            RewriteEngine On
            # Allow access to storage/app/public (symlinked from public_html/storage)
            RewriteRule ^storage/app/public/ - [L]
            RewriteRule ^ - [F,L]
        </IfModule>
        <IfModule !mod_rewrite.c>
            Order Allow,Deny
            Deny from all
        </IfModule>
        Options -Indexes
        <FilesMatch "\.(env|lock|xml|json|yml|yaml|log|sql)$">
            Order Allow,Deny
            Deny from all
        </FilesMatch>
        HTEOF

        # Block core-cms access from parent directory
        cat > /home/sistemja/.htaccess << 'HTEOF'
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteRule ^core-cms/ - [F,L]
        </IfModule>
        Options -Indexes
        HTEOF

        # Protect public_html from exposing sensitive files
        # (storage symlink is needed, but .env/.git/etc must be blocked)
        cat > /home/sistemja/public_html/.htaccess << 'HTEOF'
        # NOTE: Options removed to allow server default symlink handling

        # Hide PHP version
        <IfModule mod_headers.c>
            Header always unset X-Powered-By
        </IfModule>

        # Block access to sensitive files
        <FilesMatch "(\.env|\.git|composer\.(json|lock)|phpunit\.xml|\.htaccess)$">
            Order Allow,Deny
            Deny from all
        </FilesMatch>

        # Laravel routing
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </IfModule>
        HTEOF

        # Block vendor directory access (extra layer)
        cat > /home/sistemja/core-cms/vendor/.htaccess << 'HTEOF'
        Order Allow,Deny
        Deny from all
        HTEOF

        # Set correct permissions
        chmod 750 /home/sistemja/core-cms
        chmod 640 /home/sistemja/core-cms/.env
        chmod -R 775 /home/sistemja/core-cms/storage
        chmod -R 775 /home/sistemja/core-cms/bootstrap/cache

        echo "Deploy completed successfully"
        REMOTE
