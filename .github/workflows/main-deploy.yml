name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main # Script berjalan setiap kali ada push ke branch main

jobs:
  web-deploy:
    name: 🎉 Deploy via SSH (Encrypted Key)
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, curl, dom, fileinfo, zip, gd

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm ci
        npm run build

    - name: 🗜️ Compress files
      run: |
        tar -czf /tmp/deploy.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='.env.example' \
          --exclude='tests' \
          --exclude='_cms-sja-excluded' \
          --exclude='docs' \
          --exclude='phpunit.xml' \
          --exclude='README.md' \
          --exclude='CLAUDE.md' \
          --exclude='storage/logs/*' \
          --exclude='storage/framework/cache/*' \
          --exclude='storage/framework/sessions/*' \
          --exclude='storage/framework/views/*' \
          --exclude='bootstrap/cache/*' \
          . || true

    - name: Debug SSH Connectivity (Phase 1 - Secrets & Network)
      run: |
        echo "=== Layer 1: Verifying SSH Secrets in Workflow ==="
        SSH_HOST="${{ secrets.SSH_HOST }}"
        SSH_USERNAME="${{ secrets.SSH_USERNAME }}"
        SSH_PRIVATE_KEY="${{ secrets.SSH_PRIVATE_KEY }}"
        
        [ -z "$SSH_HOST" ] && echo "❌ SSH_HOST not set" || echo "✅ SSH_HOST is set: $SSH_HOST"
        [ -z "$SSH_USERNAME" ] && echo "❌ SSH_USERNAME not set" || echo "✅ SSH_USERNAME is set: $SSH_USERNAME"
        [ -z "$SSH_PRIVATE_KEY" ] && echo "❌ SSH_PRIVATE_KEY not set (CRITICAL!)" || echo "✅ SSH_PRIVATE_KEY is set (length: ${#SSH_PRIVATE_KEY} chars)"
        
        echo ""
        echo "=== Layer 2: Testing network connectivity (TCP handshake) ==="
        if timeout 5 bash -c "echo > /dev/tcp/$SSH_HOST/22" 2>/dev/null; then
          echo "✅ Port 22 is REACHABLE from GitHub Actions"
        else
          echo "❌ Port 22 is NOT REACHABLE - THIS IS THE PROBLEM!"
          echo "   Possible causes:"
          echo "   1. SSH host ($SSH_HOST) is wrong or doesn't exist"
          echo "   2. ZenHosta firewall blocks GitHub Actions IP"
          echo "   3. Server is down or SSH service not running"
          echo "   4. Network routing issue"
          exit 1
        fi
        
        echo ""
        echo "=== Layer 3: Testing with telnet/nc (alternative check) ==="
        if command -v nc &> /dev/null; then
          timeout 5 nc -zv $SSH_HOST 22 && echo "✅ nc confirms port 22 open" || echo "❌ nc: port 22 closed"
        else
          echo "⚠️  nc not available, skipping this check"
        fi

    - name: Setup SSH Key (Phase 2 - Local SSH Configuration)
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "=== Setting up SSH key locally ==="
        mkdir -p ~/.ssh
        
        # Write private key
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        
        # Verify key file
        if [ ! -f ~/.ssh/deploy_key ] || [ ! -s ~/.ssh/deploy_key ]; then
          echo "❌ ERROR: SSH key file not created or empty!"
          exit 1
        fi
        echo "✅ SSH private key file created ($(wc -c < ~/.ssh/deploy_key) bytes)"
        
        # Add known_hosts (prevents "authenticity" prompt)
        echo "=== Adding host to known_hosts ==="
        ssh-keyscan -t ed25519,rsa -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null && \
          echo "✅ Host key added to known_hosts" || \
          echo "⚠️  Could not fetch host key (may fail later)"
        
        # Set proper permissions
        chmod 700 ~/.ssh
        echo "✅ SSH directory configured"

    - name: Upload to Server via SCP (Phase 3 - SCP Transfer)
      run: |
        echo "=== Attempting SCP upload with verbose output ==="
        scp -v -i ~/.ssh/deploy_key \
          -o ConnectTimeout=10 \
          -o StrictHostKeyChecking=accept-new \
          -o PasswordAuthentication=no \
          -o PubkeyAuthentication=yes \
          /tmp/deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/sistemja/
        
        if [ $? -eq 0 ]; then
          echo "✅ SCP upload successful"
        else
          echo "❌ SCP upload failed - check errors above"
          exit 1
        fi

    - name: Extract and Deploy via SSH (Phase 4 - Remote Execution)
      run: |
        echo "=== Testing SSH connection with verbose output ==="
        ssh -v -i ~/.ssh/deploy_key \
          -o ConnectTimeout=10 \
          -o StrictHostKeyChecking=accept-new \
          -o PasswordAuthentication=no \
          -o PubkeyAuthentication=yes \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
          echo "✅ SSH connection successful"
          cd /home/sistemja/
          mkdir -p cms-core
          tar -xzf deploy.tar.gz -C cms-core/
          rm deploy.tar.gz
          cd cms-core
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
          php artisan storage:link 2>/dev/null || true
          echo "✅ Deploy selesai!"
        EOF
