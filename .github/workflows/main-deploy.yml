name: Deploy Laravel via SSH

on:
  push:
    branches:
      - main # Script berjalan saat ada push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Mengambil Kode dari GitHub
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, curl, dom, fileinfo, zip, gd

      - name: 📦 Install Dependensi PHP (Composer)
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🛠️ Build Aset Frontend (Vite/Tailwind)
        run: |
          npm ci
          npm run build

      - name: 🧹 Bersihkan File Tidak Perlu
        run: rm -rf node_modules tests .github docs _cms-sja-excluded

      - name: 🔑 Setup Kunci SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Deploy ke Server via Rsync (SSH)
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='.env' \
          --exclude='.env.example' \
          --exclude='storage/logs/*' \
          --exclude='storage/framework/cache/*' \
          --exclude='storage/framework/sessions/*' \
          --exclude='storage/framework/views/*' \
          --exclude='storage/app/private/*' \
          --exclude='storage/app/public/*' \
          --exclude='bootstrap/cache/*' \
          --exclude='tests/' \
          --exclude='.github/' \
          --exclude='docs/' \
          --exclude='_cms-sja-excluded/' \
          --exclude='phpunit.xml' \
          --exclude='README.md' \
          --exclude='CLAUDE.md' \
          ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/cms-core/

      - name: ⚙️ Post-Deploy (Artisan Commands di Server)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/cms-core
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            php artisan storage:link 2>/dev/null || true
            echo "Deploy selesai!"
          EOF

