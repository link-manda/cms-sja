name: Deploy Web CMS ke ZenHosta

on:
  push:
    branches:
      - main # Script berjalan setiap kali ada push ke branch main

jobs:
  web-deploy:
    name: 🎉 Deploy via SSH (Encrypted Key)
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, bcmath, curl, dom, fileinfo, zip, gd

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: 🟢 Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 🏗️ Build Frontend Assets (Tailwind/Vite)
      run: |
        npm ci
        npm run build

    - name: 🗜️ Compress files
      run: |
        tar -czf /tmp/deploy.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='.env.example' \
          --exclude='tests' \
          --exclude='_cms-sja-excluded' \
          --exclude='docs' \
          --exclude='phpunit.xml' \
          --exclude='README.md' \
          --exclude='CLAUDE.md' \
          --exclude='storage/logs/*' \
          --exclude='storage/framework/cache/*' \
          --exclude='storage/framework/sessions/*' \
          --exclude='storage/framework/views/*' \
          --exclude='bootstrap/cache/*' \
          . || true

    - name: 🔍 Debug SSH Connectivity
      run: |
        echo "=== Verifying SSH Secrets ==="
        [ -z "${{ secrets.SSH_HOST }}" ] && echo "❌ SSH_HOST not set" || echo "✅ SSH_HOST is set"
        [ -z "${{ secrets.SSH_USERNAME }}" ] && echo "❌ SSH_USERNAME not set" || echo "✅ SSH_USERNAME is set"
        [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && echo "❌ SSH_PRIVATE_KEY not set" || echo "✅ SSH_PRIVATE_KEY is set"
        
        echo ""
        echo "=== Testing network connectivity to SSH host ==="
        timeout 5 bash -c "echo > /dev/tcp/${{ secrets.SSH_HOST }}/22" 2>/dev/null && \
          echo "✅ Port 22 is reachable" || \
          echo "❌ Port 22 NOT reachable - check firewall/host configuration"

    - name: 🔑 Setup SSH Key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: 🚀 Upload to Server via SCP
      run: |
        scp -i ~/.ssh/deploy_key \
          -o ConnectTimeout=10 \
          -o StrictHostKeyChecking=accept-new \
          /tmp/deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/sistemja/

    - name: 💥 Extract and Deploy via SSH
      run: |
        ssh -i ~/.ssh/deploy_key \
          -o ConnectTimeout=10 \
          -o StrictHostKeyChecking=accept-new \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /home/sistemja/
          mkdir -p cms-core
          tar -xzf deploy.tar.gz -C cms-core/
          rm deploy.tar.gz
          cd cms-core
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan migrate --force
          php artisan storage:link 2>/dev/null || true
          echo "Deploy selesai!"
        EOF
